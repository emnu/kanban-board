name: Kanban
options:
  bundleIdPrefix: com.kanbanapp
targets:
  Kanban:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.673711859742-5p9du971aqiibaoo34o4ng8emjvkqoqe
              - com.kanbanapp.oauth
